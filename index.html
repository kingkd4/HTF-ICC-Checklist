<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTF ICC Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–cream: #f7f3ee;
–cream-dark: #ede7dd;
–teal: #5b8c8a;
–teal-light: #7aadab;
–teal-dim: rgba(91,140,138,0.12);
–rose: #c4796a;
–text: #2c2825;
–text-muted: #8a7f78;
–border: rgba(91,140,138,0.2);
–shadow: 0 4px 24px rgba(44,40,37,0.08);
}

body {
background: var(–cream);
font-family: ‘Jost’, sans-serif;
color: var(–text);
min-height: 100vh;
padding: 32px 16px 60px;
}

header {
text-align: center;
margin-bottom: 36px;
}

header h1 {
font-family: ‘Cormorant Garamond’, serif;
font-size: 2.2rem;
font-weight: 300;
letter-spacing: 0.04em;
color: var(–text);
}

header p {
font-size: 0.75rem;
font-weight: 300;
color: var(–text-muted);
letter-spacing: 0.12em;
text-transform: uppercase;
margin-top: 6px;
}

/* Toggle */
.toggle-wrap {
display: flex;
justify-content: center;
gap: 0;
margin-bottom: 28px;
border: 1.5px solid var(–border);
border-radius: 40px;
width: fit-content;
margin-inline: auto;
overflow: hidden;
background: white;
}

.toggle-btn {
padding: 10px 32px;
font-family: ‘Jost’, sans-serif;
font-size: 0.8rem;
font-weight: 400;
letter-spacing: 0.1em;
text-transform: uppercase;
border: none;
cursor: pointer;
background: transparent;
color: var(–text-muted);
transition: all 0.25s ease;
}

.toggle-btn.active-buy {
background: var(–teal);
color: white;
border-radius: 40px;
}

.toggle-btn.active-sell {
background: var(–rose);
color: white;
border-radius: 40px;
}

/* Progress bar */
.progress-wrap {
max-width: 520px;
margin: 0 auto 28px;
}

.progress-label {
display: flex;
justify-content: space-between;
font-size: 0.7rem;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(–text-muted);
margin-bottom: 8px;
}

.progress-bar {
height: 3px;
background: var(–cream-dark);
border-radius: 4px;
overflow: hidden;
}

.progress-fill {
height: 100%;
border-radius: 4px;
transition: width 0.4s ease;
background: var(–teal);
}

.progress-fill.sell-fill {
background: var(–rose);
}

/* Sections */
.checklist {
max-width: 520px;
margin: 0 auto;
display: flex;
flex-direction: column;
gap: 10px;
}

.section-label {
font-family: ‘Cormorant Garamond’, serif;
font-size: 0.95rem;
font-style: italic;
color: var(–text-muted);
letter-spacing: 0.05em;
padding: 4px 0 2px;
margin-top: 8px;
border-bottom: 1px solid var(–border);
padding-bottom: 6px;
}

/* Items */
.item {
display: flex;
align-items: flex-start;
gap: 14px;
background: white;
border: 1.5px solid var(–border);
border-radius: 14px;
padding: 14px 16px;
cursor: pointer;
transition: all 0.2s ease;
user-select: none;
}

.item:hover {
border-color: var(–teal-light);
box-shadow: var(–shadow);
}

.item.sell-mode:hover {
border-color: var(–rose);
}

.item.checked {
background: var(–teal-dim);
border-color: var(–teal);
}

.item.checked.sell-mode {
background: rgba(196,121,106,0.1);
border-color: var(–rose);
}

.checkbox {
width: 22px;
height: 22px;
border-radius: 50%;
border: 1.5px solid var(–border);
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
margin-top: 1px;
transition: all 0.2s ease;
}

.item.checked .checkbox {
background: var(–teal);
border-color: var(–teal);
}

.item.checked.sell-mode .checkbox {
background: var(–rose);
border-color: var(–rose);
}

.checkmark {
opacity: 0;
transform: scale(0.5);
transition: all 0.2s ease;
color: white;
font-size: 11px;
}

.item.checked .checkmark {
opacity: 1;
transform: scale(1);
}

.step-num {
font-family: ‘Cormorant Garamond’, serif;
font-size: 0.75rem;
color: var(–text-muted);
flex-shrink: 0;
margin-top: 3px;
width: 16px;
font-style: italic;
}

.item-content {
flex: 1;
}

.item-title {
font-size: 0.85rem;
font-weight: 500;
color: var(–text);
line-height: 1.4;
}

.item-sub {
font-size: 0.75rem;
color: var(–text-muted);
margin-top: 3px;
font-weight: 300;
line-height: 1.4;
}

/* Branch note */
.branch-note {
background: var(–cream-dark);
border-left: 2px solid var(–teal);
border-radius: 0 10px 10px 0;
padding: 10px 14px;
font-size: 0.75rem;
color: var(–text-muted);
line-height: 1.5;
}

.branch-note.sell-branch {
border-left-color: var(–rose);
}

/* Reset */
.reset-btn {
display: block;
margin: 32px auto 0;
padding: 10px 28px;
border: 1.5px solid var(–border);
border-radius: 40px;
background: white;
font-family: ‘Jost’, sans-serif;
font-size: 0.72rem;
letter-spacing: 0.12em;
text-transform: uppercase;
color: var(–text-muted);
cursor: pointer;
transition: all 0.2s ease;
}

.reset-btn:hover {
border-color: var(–teal);
color: var(–teal);
}

/* Complete state */
.complete-msg {
text-align: center;
padding: 20px;
display: none;
}

.complete-msg.visible {
display: block;
animation: fadeUp 0.4s ease;
}

.complete-msg p {
font-family: ‘Cormorant Garamond’, serif;
font-size: 1.4rem;
font-weight: 300;
font-style: italic;
color: var(–teal);
}

.complete-msg.sell-complete p {
color: var(–rose);
}

@keyframes fadeUp {
from { opacity: 0; transform: translateY(10px); }
to { opacity: 1; transform: translateY(0); }
}

.hidden { display: none; }
</style>

</head>
<body>

<header>
  <h1>HTF ICC Checklist</h1>
  <p>Higher Timeframe · Indication · Correction · Continuation</p>
</header>

<div class="toggle-wrap">
  <button class="toggle-btn active-buy" id="buyBtn" onclick="setMode('buy')">▲ Buy</button>
  <button class="toggle-btn" id="sellBtn" onclick="setMode('sell')">▼ Sell</button>
</div>

<div class="progress-wrap">
  <div class="progress-label">
    <span>Progress</span>
    <span id="progressText">0 / 0</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<div class="checklist" id="checklist"></div>

<div class="complete-msg" id="completeMsg">
  <p id="completeText">Setup confirmed. Prepare to execute.</p>
</div>

<button class="reset-btn" onclick="resetAll()">Reset Checklist</button>

<script>
const buySteps = [
  {
    section: "Phase 1 — Higher Timeframe Bias",
    items: [
      { title: "Mark 4H swing high & swing low", sub: "Identify the most recent 4H structure. These are your primary reference levels." },
      { title: "Mark 1H swing high & swing low", sub: "Drill down to the 1H and mark the most recent HH and HL structure." },
      { title: "Confirm bullish bias on 4H or 1H", sub: "Price should be making HH and HL on at least one HTF. All timeframes must align." },
    ]
  },
  {
    section: "Phase 2 — Indication",
    items: [
      { title: "Identify indication on 4H or 1H", sub: "Look for a clear bullish move (BOS / impulse) on the 1H or 4H that signals upward intent." },
      { title: "Confirm indication is complete", sub: "Wait for the impulse leg to finish before dropping to lower timeframes." },
    ]
  },
  {
    section: "Phase 3 — Correction",
    items: [
      { title: "Drop to 15min — watch for correction to end", sub: "Monitor the 15-minute chart for price to pull back (correct) after the indication." },
      {
        title: "Identify correction type",
        sub: "Two valid correction paths — see note below:",
        branch: true,
        branchText: "Path A: Price pulls below the 15min swing low (HL) → Mark the correction swing high as your pink line.\nPath B: Price holds above the swing low (shallow pullback) → Scale directly to 5min once indication appears over."
      },
      { title: "Mark pink line (correction swing high / HH–HL level)", sub: "Draw a pink line at the HH or HL formed during the correction on the 15min. This is your entry trigger level." },
    ]
  },
  {
    section: "Phase 4 — Continuation Entry",
    items: [
      { title: "15min candle breaks above pink line", sub: "Wait for a clear break of the pink line on the 15-minute chart. Continuation confirmed — scale to 5min immediately." },
      { title: "Scale to 5min chart", sub: "Drill down to the 5-minute for entry refinement." },
      { title: "Look for 5min entry confirmation", sub: "Expect a retest of the pink line or 5min structure after the break. Enter on the retest or 1min signal." },
      { title: "Set stop loss below 5min swing low", sub: "Place stop below the most recent 5min swing low (the HL formed during the correction)." },
    ]
  },
  {
    section: "Phase 5 — Alignment Check",
    items: [
      { title: "4H direction ✓ aligned bullish", sub: "" },
      { title: "1H direction ✓ aligned bullish (HH + HL)", sub: "" },
      { title: "15min correction completed ✓", sub: "" },
      { title: "5min entry confirmed ✓", sub: "All timeframes must correlate before executing." },
    ]
  }
];

const sellSteps = [
  {
    section: "Phase 1 — Higher Timeframe Bias",
    items: [
      { title: "Mark 4H swing high & swing low", sub: "Identify the most recent 4H structure. These are your primary reference levels." },
      { title: "Mark 1H swing high & swing low", sub: "Drill down to the 1H and mark the most recent LH and LL structure." },
      { title: "Confirm bearish bias on 4H or 1H", sub: "Price should be making LH and LL on at least one HTF. All timeframes must align." },
    ]
  },
  {
    section: "Phase 2 — Indication",
    items: [
      { title: "Identify indication on 4H or 1H", sub: "Look for a clear bearish move (BOS / impulse) on the 1H or 4H that signals downward intent." },
      { title: "Confirm indication is complete", sub: "Wait for the impulse leg to finish before dropping to lower timeframes." },
    ]
  },
  {
    section: "Phase 3 — Correction",
    items: [
      { title: "Drop to 15min — watch for correction to end", sub: "Monitor the 15-minute chart for price to pull back (correct) upward after the indication." },
      {
        title: "Identify correction type",
        sub: "Two valid correction paths — see note below:",
        branch: true,
        branchText: "Path A: Price rallies above the 15min swing high (LH) → Mark the correction swing low as your pink line.\nPath B: Price stays below the swing high (shallow pullback) → Scale directly to 5min once indication appears over."
      },
      { title: "Mark pink line (correction swing low / LH–LL level)", sub: "Draw a pink line at the LH or LL formed during the correction on the 15min. This is your entry trigger level." },
    ]
  },
  {
    section: "Phase 4 — Continuation Entry",
    items: [
      { title: "15min candle breaks below pink line", sub: "Wait for a clear break of the pink line on the 15-minute chart. Continuation confirmed — scale to 5min immediately." },
      { title: "Scale to 5min chart", sub: "Drill down to the 5-minute for entry refinement." },
      { title: "Look for 5min entry confirmation", sub: "Expect a retest of the pink line or 5min structure after the break. Enter on the retest or 1min signal." },
      { title: "Set stop loss above 5min swing high", sub: "Place stop above the most recent 5min swing high (the LH formed during the correction)." },
    ]
  },
  {
    section: "Phase 5 — Alignment Check",
    items: [
      { title: "4H direction ✓ aligned bearish", sub: "" },
      { title: "1H direction ✓ aligned bearish (LH + LL)", sub: "" },
      { title: "15min correction completed ✓", sub: "" },
      { title: "5min entry confirmed ✓", sub: "All timeframes must correlate before executing." },
    ]
  }
];

let mode = 'buy';
let checked = {};

function setMode(m) {
  mode = m;
  checked = {};
  document.getElementById('buyBtn').className = 'toggle-btn' + (m === 'buy' ? ' active-buy' : '');
  document.getElementById('sellBtn').className = 'toggle-btn' + (m === 'sell' ? ' active-sell' : '');
  document.getElementById('completeMsg').className = 'complete-msg';
  render();
}

function render() {
  const steps = mode === 'buy' ? buySteps : sellSteps;
  const fill = document.getElementById('progressFill');
  fill.className = 'progress-fill' + (mode === 'sell' ? ' sell-fill' : '');

  const checklist = document.getElementById('checklist');
  checklist.innerHTML = '';

  let totalItems = 0;
  let totalChecked = 0;
  let stepNum = 0;

  steps.forEach(section => {
    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = section.section;
    checklist.appendChild(label);

    section.items.forEach(item => {
      stepNum++;
      const key = `${mode}_${stepNum}`;
      totalItems++;
      if (checked[key]) totalChecked++;

      const el = document.createElement('div');
      el.className = 'item' + (checked[key] ? ' checked' : '') + (mode === 'sell' ? ' sell-mode' : '');
      el.onclick = () => toggle(key);

      el.innerHTML = `
        <div class="checkbox"><span class="checkmark">✓</span></div>
        <div class="step-num">${stepNum}</div>
        <div class="item-content">
          <div class="item-title">${item.title}</div>
          ${item.sub ? `<div class="item-sub">${item.sub}</div>` : ''}
        </div>
      `;
      checklist.appendChild(el);

      if (item.branch) {
        const note = document.createElement('div');
        note.className = 'branch-note' + (mode === 'sell' ? ' sell-branch' : '');
        note.style.whiteSpace = 'pre-line';
        note.textContent = item.branchText;
        checklist.appendChild(note);
      }
    });
  });

  const pct = totalItems > 0 ? Math.round((totalChecked / totalItems) * 100) : 0;
  document.getElementById('progressText').textContent = `${totalChecked} / ${totalItems}`;
  document.getElementById('progressFill').style.width = pct + '%';

  const msg = document.getElementById('completeMsg');
  const txt = document.getElementById('completeText');
  if (totalChecked === totalItems && totalItems > 0) {
    txt.textContent = mode === 'buy' ? 'All conditions met. Execute long.' : 'All conditions met. Execute short.';
    msg.className = 'complete-msg visible' + (mode === 'sell' ? ' sell-complete' : '');
  } else {
    msg.className = 'complete-msg';
  }
}

function toggle(key) {
  checked[key] = !checked[key];
  render();
}

function resetAll() {
  checked = {};
  document.getElementById('completeMsg').className = 'complete-msg';
  render();
}

render();
</script>

</body>
</html>
